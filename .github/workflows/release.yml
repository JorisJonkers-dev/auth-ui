name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: '${{ steps.rp.outputs.release_created }}'
      tag_name: '${{ steps.rp.outputs.tag_name }}'
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        continue-on-error: true
        with:
          app-id: '${{ secrets.RELEASE_APP_ID }}'
          private-key: '${{ secrets.RELEASE_APP_PRIVATE_KEY }}'

      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token: '${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}'
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-image:
    name: Publish Image
    needs:
      - release-please
    if: '${{ needs.release-please.outputs.release_created == ''true'' }}'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: '${{ needs.release-please.outputs.tag_name }}'

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: '${{ github.actor }}'
          password: '${{ github.token }}'

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: 'linux/amd64,linux/arm64'
          push: true
          tags: |
            ghcr.io/jorisjonkers-dev/auth-ui:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/jorisjonkers-dev/auth-ui:${{ github.sha }}
          cache-from: 'type=gha,scope=auth-ui'
          cache-to: 'type=gha,mode=max,scope=auth-ui'
          secrets: |
            github_token=${{ github.token }}

  publish-deploy-bundle:
    name: Publish Deploy Bundle
    needs:
      - release-please
      - publish-image
    if: '${{ needs.release-please.outputs.release_created == ''true'' }}'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: '${{ needs.release-please.outputs.tag_name }}'

      - uses: actions/checkout@v6
        with:
          repository: JorisJonkers-dev/github-workflows
          ref: v0.8.1
          path: .github-workflows
          persist-credentials: false

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: '${{ github.actor }}'
          password: '${{ github.token }}'

      - name: Resolve released image digest
        id: image
        env:
          IMAGE_NAME: auth-ui
          VERSION: '${{ needs.release-please.outputs.tag_name }}'
          GITHUB_REPOSITORY_OWNER: '${{ github.repository_owner }}'
        run: |
          set -euo pipefail

          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image_ref="ghcr.io/${owner}/${IMAGE_NAME}:${VERSION}"
          digest="$(docker buildx imagetools inspect "$image_ref" --format '{{json .Manifest.Digest}}' | jq -r .)"
          if [ -z "$digest" ] || [ "$digest" = 'null' ]; then
            echo "::error::Unable to resolve digest for $image_ref"
            exit 1
          fi
          printf 'image=%s@%s\n' "$image_ref" "$digest" >> "$GITHUB_OUTPUT"

      - name: Write release image lock
        env:
          IMAGE_REF: '${{ steps.image.outputs.image }}'
        run: |
          set -euo pipefail

          jq -n --arg image "$IMAGE_REF" '[$image]' > "$RUNNER_TEMP/images.lock.json"

      - name: Pack deploy bundle
        id: bundle
        uses: ./.github-workflows/actions/deploy-bundle
        with:
          deploy-dir: deploy
          images: '${{ runner.temp }}/images.lock.json'
          package-version: 0.9.0
          version: '${{ needs.release-please.outputs.tag_name }}'
          bundle-name: auth-ui
          node-auth-token: '${{ github.token }}'

      - uses: oras-project/setup-oras@v2

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: '${{ github.token }}'
        run: |
          set -euo pipefail

          oras login ghcr.io --username "$GITHUB_ACTOR" --password-stdin <<< "$GHCR_TOKEN"

      - name: Publish deploy bundle
        env:
          BUNDLE_PATH: '${{ steps.bundle.outputs.bundle-path }}'
          BUNDLE_VERSION: '${{ steps.bundle.outputs.bundle-version }}'
          GITHUB_REPOSITORY_OWNER: '${{ github.repository_owner }}'
        run: |
          set -euo pipefail

          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          bundle_ref="ghcr.io/${owner}/auth-ui-deploy-bundle:${BUNDLE_VERSION}"
          oras push "$bundle_ref" "$BUNDLE_PATH:application/vnd.jorisjonkers.deployment.bundle.v1+tar"
