name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pull-requests: read

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/actionlint
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) latest /tmp/actionlint

      - name: Run actionlint
        run: /tmp/actionlint/actionlint

  web-check:
    name: Web Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - uses: actions/create-github-app-token@v2
        id: package-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-packages: read

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ steps.package-token.outputs.token || secrets.GITHUB_TOKEN }}

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test:coverage

      - run: pnpm depcruise

      - run: pnpm build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - uses: actions/create-github-app-token@v2
        id: package-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-packages: read

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ steps.package-token.outputs.token || secrets.GITHUB_TOKEN }}

      - run: pnpm exec playwright install --with-deps

      - run: pnpm test:e2e

  mutation:
    name: Mutation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - uses: actions/create-github-app-token@v2
        id: package-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-packages: read

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ steps.package-token.outputs.token || secrets.GITHUB_TOKEN }}

      - run: pnpm stryker

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: actions/create-github-app-token@v2
        id: package-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-packages: read

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ghcr.io/jorisjonkers-dev/auth-ui:ci-${{ github.sha }}
          secrets: |
            github_token=${{ steps.package-token.outputs.token || secrets.GITHUB_TOKEN }}

  pipeline-complete:
    name: Pipeline Complete
    runs-on: ubuntu-latest
    needs: [workflow-lint, web-check, e2e, mutation, docker-build]
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
