name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pull-requests: read

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download actionlint
        id: actionlint
        shell: bash
        run: 'bash <(curl --fail --silent --show-error --location https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)'

      - name: Lint GitHub Actions workflows
        shell: bash
        run: '${{ steps.actionlint.outputs.executable }} -color .github/workflows/*.yml'

  web-check:
    name: Web Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken "$NODE_AUTH_TOKEN"
          pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: 'pnpm test:coverage'

      - run: pnpm depcruise

      - run: pnpm build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken "$NODE_AUTH_TOKEN"
          pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps

      - run: 'pnpm test:e2e'

  mutation:
    name: Mutation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken "$NODE_AUTH_TOKEN"
          pnpm install --frozen-lockfile

      - run: pnpm stryker

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: 'ghcr.io/jorisjonkers-dev/auth-ui:ci-${{ github.sha }}'
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

  deploy-bundle:
    name: Deploy Bundle
    uses: JorisJonkers-dev/github-workflows/.github/workflows/deploy-bundle.yml@v0.8.0
    permissions:
      contents: read
      packages: write
    with:
      deploy-dir: deploy
      images: deploy/images.lock.json
      package-version: 0.9.0
      version: '0.0.0-ci.${{ github.run_number }}.${{ github.run_attempt }}'
      bundle-name: auth-ui
      publish: false
    secrets:
      packages-token: '${{ secrets.GITHUB_TOKEN }}'

  pipeline-complete:
    name: Pipeline Complete
    runs-on: ubuntu-latest
    needs:
      - workflow-lint
      - web-check
      - e2e
      - mutation
      - docker-build
      - deploy-bundle
    if: '${{ always() }}'
    steps:
      - name: Check required jobs
        uses: re-actors/alls-green@release/v1
        with:
          jobs: '${{ toJSON(needs) }}'
